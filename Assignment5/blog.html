<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Lorebird Maps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>


<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="blog.html">🧭</a>
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="blog.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <header class="hero">
        <h1>Lorebird Maps</h1>
        <h5>Fantasy Cartography and Worldbuilding</h5>
    </header>


    <div class="link-bar">
        <a href="https://www.etsy.com/shop/LoreBirdMaps" target="_blank" class="link-button">Etsy</a>
        <a href="https://www.instagram.com/lorebirdmaps" target="_blank" class="link-button">Instagram</a>
        <a href="notrealyet" class="link-button">Email</a>
    </div>

    <main>
        <section class="gallery">

            <div class="card">
                <div class="card-image">
                    <img src="images/kenshiplaceholder.jpg" alt="Artwork 1">

                    <div class="card-overlay">
                        <h2>The World of Kenshi</h2>
                        <a href="#" class="card-button">Learn More</a>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-image">
                    <img src="images/vlandiaplaceholder.png" alt="Artwork 2">

                    <div class="card-overlay">
                        <h2>The World of Bannerlord</h2>
                        <a href="#" class="card-button">Learn More</a>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-image">
                    <img src="images/rdrplaceholder.JPG" alt="Artwork 3">

                    <div class="card-overlay">
                        <h2>The World of Red Dead Redemption</h2>
                        <a href="#" class="card-button">Learn More</a>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <footer>
        <p>&copy; <span id="year"></span> Michael Oliver</p>

        <script>
            document.getElementById("year").textContent = new Date().getFullYear();
        </script>
